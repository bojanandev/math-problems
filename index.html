<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Problem Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .app {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      text-align: center;
      font-size: 26px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 1.75rem;
    }

    .topic-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      justify-content: center;
    }

    .topic-btn {
      padding: 8px 18px;
      border-radius: 99px;
      border: 1.5px solid #ccc;
      background: #fff;
      color: #555;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .topic-btn.active {
      background: #1D9E75;
      border-color: #1D9E75;
      color: #fff;
    }

    .score-row {
      display: flex;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .score-card {
      flex: 1;
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
      border: 1px solid #e5e5e5;
    }

    .score-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }

    .score-val {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .score-val.green { color: #0F6E56; }

    .problem-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 2.5rem 1.5rem 2rem;
      text-align: center;
    }

    .problem-text {
      font-size: 40px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 1.75rem;
      letter-spacing: -0.5px;
    }

    .answer-row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }

    .answer-row input {
      width: 96px;
      font-size: 22px;
      text-align: center;
      padding: 10px 0;
      border: 1.5px solid #ccc;
      border-radius: 10px;
      background: #f9f9f9;
      color: #1a1a1a;
      outline: none;
      transition: box-shadow 0.15s, border-color 0.15s;
    }

    .answer-row input:focus {
      border-color: #1D9E75;
      box-shadow: 0 0 0 3px rgba(29, 158, 117, 0.15);
    }

    .check-btn {
      padding: 10px 24px;
      font-size: 15px;
      border-radius: 10px;
      border: none;
      background: #1D9E75;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
    }

    .check-btn:hover { opacity: 0.88; }
    .check-btn:active { transform: scale(0.97); }

    .feedback {
      font-size: 15px;
      font-weight: 600;
      margin-top: 1.25rem;
      min-height: 24px;
    }

    .feedback.correct { color: #0F6E56; }
    .feedback.wrong   { color: #993C1D; }

    .next-btn {
      margin-top: 1.25rem;
      padding: 10px 28px;
      font-size: 14px;
      border-radius: 10px;
      background: transparent;
      border: 1.5px solid #ccc;
      color: #555;
      cursor: pointer;
      transition: background 0.15s;
      display: none;
    }

    .digit-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      justify-content: center;
    }

    .digit-label {
      font-size: 14px;
      color: #888;
    }

    .digit-toggle {
      display: flex;
      background: #fff;
      border: 1.5px solid #ccc;
      border-radius: 99px;
      padding: 3px;
      gap: 3px;
    }

    .digit-btn {
      padding: 6px 16px;
      border-radius: 99px;
      border: none;
      background: transparent;
      color: #555;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .digit-btn.active {
      background: #1D9E75;
      color: #fff;
      font-weight: 600;
    }

    .lang-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      justify-content: center;
    }

    .lang-label {
      font-size: 14px;
      color: #888;
    }

    .lang-toggle {
      display: flex;
      background: #fff;
      border: 1.5px solid #ccc;
      border-radius: 99px;
      padding: 3px;
      gap: 3px;
    }

    .lang-btn {
      padding: 6px 16px;
      border-radius: 99px;
      border: none;
      background: transparent;
      color: #555;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .lang-btn.active {
      background: #1D9E75;
      color: #fff;
      font-weight: 600;
    }

    .diff-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      justify-content: center;
    }

    .diff-label {
      font-size: 14px;
      color: #888;
    }

    .diff-toggle {
      display: flex;
      background: #fff;
      border: 1.5px solid #ccc;
      border-radius: 99px;
      padding: 3px;
      gap: 3px;
    }

    .diff-btn {
      padding: 6px 16px;
      border-radius: 99px;
      border: none;
      background: transparent;
      color: #555;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .diff-btn.active {
      background: #1D9E75;
      color: #fff;
      font-weight: 600;
    }

    .history-section {
      margin-top: 2rem;
      text-align: center;
    }

    .history-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1.5px solid #ccc;
      background: #fff;
      color: #555;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .history-btn:hover {
      background: #f0f0f0;
    }

    .history-list {
      list-style: none;
      padding: 0;
      margin-top: 1rem;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .history-list li {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 4px;
      text-align: left;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="app">
  <h1>🧮 Math Problems</h1>

  <div class="lang-row">
    <span class="lang-label">Language:</span>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="mk">MK</button>
    </div>
  </div>

  <div class="diff-row">
    <span class="diff-label">Difficulty:</span>
    <div class="diff-toggle">
      <button class="diff-btn active" data-diff="beginner">Beginner</button>
      <button class="diff-btn" data-diff="advanced">Advanced</button>
    </div>
  </div>

  <div class="topic-row" id="topics">
    <button class="topic-btn active" data-topic="add">+ Addition</button>
    <button class="topic-btn active" data-topic="sub">− Subtraction</button>
    <button class="topic-btn active" data-topic="mul">× Multiplication</button>
    <button class="topic-btn active" data-topic="div">÷ Division</button>
  </div>

  <div class="digit-row">
    <span class="digit-label">Number size:</span>
    <div class="digit-toggle">
      <button class="digit-btn active" data-digit="single">1–9</button>
      <button class="digit-btn" data-digit="double">10–99</button>
      <button class="digit-btn" data-digit="both">Both</button>
    </div>
  </div>

  <div class="score-row">
    <div class="score-card">
      <div class="score-label">Score</div>
      <div class="score-val green" id="score">0</div>
    </div>
    <div class="score-card">
      <div class="score-label">Attempted</div>
      <div class="score-val" id="attempted">0</div>
    </div>
    <div class="score-card">
      <div class="score-label">Streak</div>
      <div class="score-val" id="streak">0 ⭐</div>
    </div>
  </div>

  <div class="problem-card">
    <div class="problem-text" id="problem">?</div>
    <div class="answer-row">
      <input type="number" id="answer-input" placeholder="?" autocomplete="off" />
      <button class="check-btn" onclick="checkAnswer()">Check</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="newProblem()">Next problem →</button>
  </div>

  <div class="history-section">
    <button class="history-btn" onclick="toggleHistory()">Last 10 <span id="history-score"></span></button>
    <ul id="history-list" class="history-list" style="display: none;"></ul>
  </div>
</div>

<script>
  const translations = {
    en: {
      title: '🧮 Math Problems',
      langLabel: 'Language:',
      diffLabel: 'Difficulty:',
      beginner: 'Beginner',
      advanced: 'Advanced',
      add: '+ Addition',
      sub: '− Subtraction',
      mul: '× Multiplication',
      div: '÷ Division',
      digitLabel: 'Number size:',
      single: '1–9',
      double: '10–99',
      both: 'Both',
      score: 'Score',
      attempted: 'Attempted',
      streak: 'Streak',
      check: 'Check',
      next: 'Next problem →',
      typeNumber: 'Type a number first!',
      correctMsgs: ['Great job! 🎉', 'Correct! ✓', 'Awesome! ⭐', 'You got it! 🌟'],
      wrongMsg: 'Not quite — the answer is {answer}. Keep trying!',
      history: 'History',
      noHistory: 'No problems solved yet.',
      lastTen: 'Last 10',
      scoreText: 'Score: {correct}/{total}'
    },
    mk: {
      title: '🧮 Математички проблеми',
      langLabel: 'Јазик:',
      diffLabel: 'Тежина:',
      beginner: 'Почетник',
      advanced: 'Напреден',
      add: '+ Собирање',
      sub: '− Одземање',
      mul: '× Множење',
      div: '÷ Делење',
      digitLabel: 'Големина на бројот:',
      single: '1–9',
      double: '10–99',
      both: 'Двете',
      score: 'Резултат',
      attempted: 'Пробувани',
      streak: 'Низа',
      check: 'Провери',
      next: 'Следен проблем →',
      typeNumber: 'Прво внесете број!',
      correctMsgs: ['Одлично! 🎉', 'Точно! ✓', 'Фантастично! ⭐', 'Го доби! 🌟'],
      wrongMsg: 'Не баш — одговорот е {answer}. Продолжи да пробуваш!',
      history: 'Историја',
      noHistory: 'Сè уште нема решени проблеми.',
      lastTen: 'Последни 10',
      scoreText: 'Резултат: {correct}/{total}'
    }
  };

  let currentLang = 'en';
  let currentDifficulty = 'advanced';
  let history = JSON.parse(localStorage.getItem('mathProblemsHistory') || '[]');
  let correct = 0, total = 0, streak = 0;
  let currentAnswer = 0;
  let activeTopics = new Set(['add', 'sub', 'mul', 'div']);
  let digitMode = 'single';
  let answered = false;

  document.querySelectorAll('.topic-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = btn.dataset.topic;
      if (activeTopics.has(t)) {
        if (activeTopics.size > 1) { activeTopics.delete(t); btn.classList.remove('active'); }
      } else { activeTopics.add(t); btn.classList.add('active'); }
      newProblem();
    });
  });

  document.querySelectorAll('.digit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.digit-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      digitMode = btn.dataset.digit;
      newProblem();
    });
  });

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentLang = btn.dataset.lang;
      updateTexts();
      newProblem();
    });
  });

  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentDifficulty = btn.dataset.diff;
      newProblem();
    });
  });

  document.getElementById('answer-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (answered) newProblem();
      else checkAnswer();
    }
  });

  function randNum() {
    if (digitMode === 'single') return Math.floor(Math.random() * 9) + 1;
    if (digitMode === 'double') return Math.floor(Math.random() * 90) + 10;
    return Math.random() < 0.5 ? Math.floor(Math.random() * 9) + 1 : Math.floor(Math.random() * 90) + 10;
  }

  function updateTexts() {
    const t = translations[currentLang];
    document.title = t.title;
    document.querySelector('h1').textContent = t.title;
    document.querySelector('.lang-label').textContent = t.langLabel;
    document.querySelector('.diff-label').textContent = t.diffLabel;
    document.querySelector('[data-diff="beginner"]').textContent = t.beginner;
    document.querySelector('[data-diff="advanced"]').textContent = t.advanced;
    document.querySelector('[data-topic="add"]').innerHTML = t.add;
    document.querySelector('[data-topic="sub"]').innerHTML = t.sub;
    document.querySelector('[data-topic="mul"]').innerHTML = t.mul;
    document.querySelector('[data-topic="div"]').innerHTML = t.div;
    document.querySelector('.digit-label').textContent = t.digitLabel;
    document.querySelector('[data-digit="single"]').textContent = t.single;
    document.querySelector('[data-digit="double"]').textContent = t.double;
    document.querySelector('[data-digit="both"]').textContent = t.both;
    document.querySelectorAll('.score-label')[0].textContent = t.score;
    document.querySelectorAll('.score-label')[1].textContent = t.attempted;
    document.querySelectorAll('.score-label')[2].textContent = t.streak;
    document.querySelector('.check-btn').textContent = t.check;
    document.querySelector('.next-btn').textContent = t.next;
    document.querySelector('.history-btn').innerHTML = t.lastTen + ' <span id="history-score"></span>';
    updateHistoryDisplay();
  }

  function updateHistoryDisplay() {
    const t = translations[currentLang];
    const historyList = document.getElementById('history-list');
    historyList.innerHTML = '';
    const total = history.length;
    const correct = history.filter(h => h.result === true).length;
    const scoreText = total > 0 ? ` (${correct}/${total})` : '';
    document.getElementById('history-score').textContent = scoreText;

    if (history.length === 0) {
      historyList.innerHTML = '<li>' + t.noHistory + '</li>';
    } else {
      const fullScoreText = t.scoreText.replace('{correct}', correct).replace('{total}', total);
      const scoreLi = document.createElement('li');
      scoreLi.textContent = fullScoreText;
      scoreLi.style.fontWeight = 'bold';
      scoreLi.style.textAlign = 'center';
      historyList.appendChild(scoreLi);

      history.slice().reverse().forEach(item => {
        const li = document.createElement('li');
        const resultIcon = item.result === null ? '⏳' : item.result ? '✅' : '❌';
        li.textContent = resultIcon + ' ' + item.question + ' = ' + item.answer;
        historyList.appendChild(li);
      });
    }
  }

  function toggleHistory() {
    const list = document.getElementById('history-list');
    list.style.display = list.style.display === 'none' ? 'block' : 'none';
  }

  function newProblem() {
    answered = false;
    const topics = [...activeTopics];
    const topic = topics[Math.floor(Math.random() * topics.length)];
    let a, b, q, baseQuestion;

    const specials = [2, 4, 5, 10];

    if (topic === 'add') {
      if (currentDifficulty === 'beginner') {
        a = Math.floor(Math.random() * 50) + 1;
        b = Math.floor(Math.random() * (100 - a)) + 1;
      } else {
        a = randNum(); b = randNum();
      }
      baseQuestion = a + ' + ' + b;
      q = baseQuestion + ' = ?';
      currentAnswer = a + b;
    } else if (topic === 'sub') {
      if (currentDifficulty === 'beginner') {
        a = Math.floor(Math.random() * 50) + 1;
        b = Math.floor(Math.random() * a) + 1;
      } else {
        a = randNum(); b = randNum();
        if (b > a) { let tmp = a; a = b; b = tmp; }
      }
      if (a === b) a++;
      baseQuestion = a + ' − ' + b;
      q = baseQuestion + ' = ?';
      currentAnswer = a - b;
    } else if (topic === 'mul') {
      if (currentDifficulty === 'beginner') {
        a = specials[Math.floor(Math.random() * specials.length)];
        b = Math.floor(Math.random() * 10) + 1;
      } else {
        a = digitMode === 'double' ? Math.floor(Math.random() * 11) + 2 : Math.floor(Math.random() * 9) + 1;
        b = digitMode === 'double' ? Math.floor(Math.random() * 11) + 2 : Math.floor(Math.random() * 9) + 1;
        if (digitMode === 'both' && Math.random() < 0.5) a = Math.floor(Math.random() * 90) + 10;
      }
      baseQuestion = a + ' × ' + b;
      q = baseQuestion + ' = ?';
      currentAnswer = a * b;
    } else {
      if (currentDifficulty === 'beginner') {
        const divisor = specials[Math.floor(Math.random() * specials.length)];
        const ans = Math.floor(Math.random() * 10) + 1;
        a = divisor * ans;
        baseQuestion = a + ' ÷ ' + divisor;
        q = baseQuestion + ' = ?';
        currentAnswer = ans;
      } else {
        const maxDiv = digitMode === 'double' ? 11 : 9;
        const maxAns = digitMode === 'double' ? 12 : 9;
        const divisor = Math.floor(Math.random() * maxDiv) + 2;
        const ans = Math.floor(Math.random() * maxAns) + 1;
        a = divisor * ans;
        baseQuestion = a + ' ÷ ' + divisor;
        q = baseQuestion + ' = ?';
        currentAnswer = ans;
      }
    }

    document.getElementById('problem').textContent = q;
    document.getElementById('answer-input').value = '';
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('answer-input').focus();

    // Add to history
    history.push({
      question: baseQuestion,
      answer: currentAnswer,
      topic: topic,
      digitMode: digitMode,
      timestamp: Date.now(),
      result: null
    });
    if (history.length > 10) history.shift();
    localStorage.setItem('mathProblemsHistory', JSON.stringify(history));
  }

  function checkAnswer() {
    if (answered) return;
    const val = parseInt(document.getElementById('answer-input').value, 10);
    if (isNaN(val)) {
      document.getElementById('feedback').textContent = translations[currentLang].typeNumber;
      return;
    }
    answered = true;
    total++;

    const fb = document.getElementById('feedback');
    const t = translations[currentLang];
    const isCorrect = val === currentAnswer;
    if (isCorrect) {
      correct++;
      streak++;
      const msgs = t.correctMsgs;
      fb.textContent = msgs[Math.floor(Math.random() * msgs.length)];
      fb.className = 'feedback correct';
    } else {
      streak = 0;
      fb.textContent = t.wrongMsg.replace('{answer}', currentAnswer);
      fb.className = 'feedback wrong';
    }

    // Update history result
    if (history.length > 0) {
      history[history.length - 1].result = isCorrect;
      localStorage.setItem('mathProblemsHistory', JSON.stringify(history));
      updateHistoryDisplay();
    }

    document.getElementById('score').textContent = correct;
    document.getElementById('attempted').textContent = total;
    document.getElementById('streak').textContent = streak + ' ⭐';
    document.getElementById('next-btn').style.display = 'inline-block';
  }

  newProblem();
  updateTexts();
  updateHistoryDisplay();
</script>
</body>
</html>
